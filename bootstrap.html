<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Steam Unlock ONENNABE - System Boot</title>

  <style>

    :root {

      --bg-dark: #020409;

      --ps5-blue: #0072ce;

      --glass-bg: rgba(255, 255, 255, 0.03);

      --glass-border: rgba(255, 255, 255, 0.08);

      --text-main: #ffffff;

      --text-soft: rgba(255, 255, 255, 0.45);

      --error-red: #ff4d4d;

    }



    * { margin: 0; padding: 0; box-sizing: border-box; }



    body {

      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;

      background: var(--bg-dark);

      color: var(--text-main);

      min-height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      overflow: hidden;

    }



    /* --- PS5 Animated Aurora Background --- */

    .atmo-layer {

      position: fixed;

      inset: 0;

      z-index: -1;

      background: radial-gradient(circle at 50% -20%, #1a2a6c 0%, transparent 50%),

                  radial-gradient(circle at 0% 100%, #000000 0%, transparent 40%),

                  radial-gradient(circle at 100% 100%, #09122b 0%, transparent 40%);

    }



    .aurora-blob {

      position: absolute;

      width: 60vw;

      height: 60vw;

      filter: blur(80px);

      opacity: 0.15;

      border-radius: 50%;

      animation: drift 25s infinite alternate ease-in-out;

    }

    .blob-1 { background: #4facfe; top: -10%; left: -10%; animation-delay: 0s; }

    .blob-2 { background: #00f2fe; bottom: -10%; right: -10%; animation-delay: -5s; }



    @keyframes drift {

      from { transform: translate(0, 0) scale(1); }

      to { transform: translate(10%, 15%) scale(1.1); }

    }



    /* --- Glassmorphic Container --- */

    .loader-container {

      position: relative;

      width: 440px;

      padding: 60px 40px;

      background: var(--glass-bg);

      backdrop-filter: blur(30px) saturate(160%);

      -webkit-backdrop-filter: blur(30px) saturate(160%);

      border: 1px solid var(--glass-border);

      border-radius: 40px;

      text-align: center;

      box-shadow: 0 25px 50px rgba(0,0,0,0.6);

      z-index: 10;

      transition: opacity 0.8s ease, transform 0.8s ease;

    }



    .loader-container.fade-out {

      opacity: 0;

      transform: scale(0.95) translateY(15px);

    }



    /* --- Liquid RGB Logo --- */

    .logo-viewport {

      position: relative;

      width: 160px;

      height: 160px;

      margin: 0 auto 45px;

    }



    .liquid-rgb {

      position: absolute;

      inset: -12px;

      border-radius: 50%;

      background: conic-gradient(

        from 0deg,

        #ff0055, #ffdd00, #00ffaa, #0055ff, #cc00ff, #ff0055

      );

      filter: blur(15px);

      animation: rgb-spin 4s linear infinite;

      opacity: 0.65;

    }



    @keyframes rgb-spin { to { transform: rotate(360deg); } }



    .logo-core {

      position: absolute;

      inset: 0;

      background: rgba(10, 15, 25, 0.9);

      backdrop-filter: blur(10px);

      border-radius: 50%;

      display: flex;

      align-items: center;

      justify-content: center;

      border: 1px solid rgba(255,255,255,0.12);

      box-shadow: inset 0 2px 10px rgba(255,255,255,0.05);

      z-index: 2;

    }



    .logo-core span {

      font-size: 52px;

      font-weight: 100;

      letter-spacing: -2px;

      color: #fff;

      opacity: 0.9;

    }



    /* --- Typography --- */

    h1 {

      font-size: 24px;

      font-weight: 200;

      letter-spacing: 7px;

      text-transform: uppercase;

      margin-bottom: 8px;

    }



    .subtitle {

      font-size: 10px;

      color: var(--ps5-blue);

      text-transform: uppercase;

      letter-spacing: 9px;

      font-weight: 600;

      margin-bottom: 40px;

    }



    .status-area {

      min-height: 20px;

      margin-bottom: 20px;

    }



    .status-text {

      font-size: 13px;

      color: var(--text-soft);

      font-weight: 300;

      letter-spacing: 0.5px;

      transition: opacity 0.3s;

    }



    /* --- Progress & Error UI --- */

    .progress-track {

      width: 100%;

      height: 3px;

      background: rgba(255,255,255,0.05);

      border-radius: 10px;

      overflow: hidden;

      margin-bottom: 10px;

    }



    .progress-fill {

      width: 0%;

      height: 100%;

      background: linear-gradient(90deg, var(--ps5-blue), #00f2fe);

      box-shadow: 0 0 15px rgba(0, 114, 206, 0.5);

      transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);

    }



    .error-ui {

      display: none;

      animation: fadeIn 0.4s ease;

    }



    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }



    .retry-btn {

      background: rgba(255,255,255,0.05);

      border: 1px solid rgba(255,255,255,0.15);

      color: #fff;

      padding: 10px 25px;

      border-radius: 8px;

      cursor: pointer;

      text-transform: uppercase;

      font-size: 10px;

      letter-spacing: 2px;

      transition: all 0.2s;

    }



    .retry-btn:hover {

      background: rgba(255,255,255,0.12);

      border-color: var(--ps5-blue);

    }

  </style>

</head>

<body>



  <div class="atmo-layer">

    <div class="aurora-blob blob-1"></div>

    <div class="aurora-blob blob-2"></div>

  </div>



  <div class="loader-container" id="boot-container">

    <div class="logo-viewport">

      <div class="liquid-rgb"></div>

      <div class="logo-core"><span>SU</span></div>

    </div>



    <h1>Steam Unlock</h1>

    <div class="subtitle">Onennabe</div>



    <div class="status-area">

      <div class="status-text" id="status">Initializing...</div>

    </div>



    <div id="progress-container">

      <div class="progress-track">

        <div class="progress-fill" id="progress-bar"></div>

      </div>

    </div>



    <div class="error-ui" id="error-ui">

      <p style="color: var(--error-red); font-size: 12px; margin-bottom: 15px;" id="error-msg">System link failure.</p>

      <button class="retry-btn" onclick="location.reload()">Off VPN/WARP and Retry</button>

    </div>

  </div>



  <script>

    /**

     * Logic configuration

     */

    const BOOT_CONFIG = {

      minDisplayTime: 4000,

      steps: [

        { p: 20, m: 'Initializing system kernels...' },

        { p: 45, m: 'Establishing secure link...' },

        { p: 70, m: 'Fetching application data...' },

        { p: 90, m: 'Processing interface...' },

        { p: 100, m: 'System Ready' }

      ]

    };



    class AppBootstrap {

      constructor() {

        this.statusEl = document.getElementById('status');

        this.progressBar = document.getElementById('progress-bar');

        this.container = document.getElementById('boot-container');

        this.errorUI = document.getElementById('error-ui');

        this.progContainer = document.getElementById('progress-container');

        this.startTime = Date.now();

        this.downloadedContent = null;

      }



      updateStatus(message) {

        this.statusEl.style.opacity = 0;

        setTimeout(() => {

          this.statusEl.textContent = message;

          this.statusEl.style.opacity = 1;

        }, 200);

      }



      updateProgress(percent) {

        this.progressBar.style.width = percent + '%';

      }



      showError(msg) {

        this.statusEl.style.display = 'none';

        this.progContainer.style.display = 'none';

        this.errorUI.style.display = 'block';

        document.getElementById('error-msg').textContent = msg;

      }



      /**

       * Original Fetch Logic

       */

      async fetchApp() {

        try {

          // Replace with your actual endpoint

          const response = await fetch('/api/bootstrap/index.html');

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          this.downloadedContent = await response.text();

        } catch (e) {

          throw new Error('Could not connect to update server.');

        }

      }



      async runSequence() {

        try {

          // Start download and animation in parallel

          const downloadPromise = this.fetchApp();



          for (const step of BOOT_CONFIG.steps) {

            this.updateStatus(step.m);

            this.updateProgress(step.p);

            await this.sleep(800);

          }



          await downloadPromise;



          // Ensure minimum time for visual polish

          const elapsed = Date.now() - this.startTime;

          if (elapsed < BOOT_CONFIG.minDisplayTime) {

            await this.sleep(BOOT_CONFIG.minDisplayTime - elapsed);

          }



          this.complete();

        } catch (error) {

          this.showError(error.message);

        }

      }



      sleep(ms) { return new Promise(r => setTimeout(r, ms)); }



      complete() {

        this.container.classList.add('fade-out');

        setTimeout(() => {

          if (this.downloadedContent) {

            document.open();

            document.write(this.downloadedContent);

            document.close();

          } else {

            console.log("Bootstrap complete. Content would inject here.");

          }

        }, 800);

      }

    }



    window.addEventListener('DOMContentLoaded', () => {

      // Small delay before starting boot sequence

      setTimeout(() => new AppBootstrap().runSequence(), 500);

    });

  </script>

</body>

</html>
